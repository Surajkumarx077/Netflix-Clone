services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: netflix_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: netflix_clone
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/data.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - netflix_network

  # Spring Boot Backend
  backend:
    build:
      context: ..
      dockerfile: devops/Dockerfile.backend
    container_name: netflix_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/netflix_clone
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET_KEY: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-dev}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/movies"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - netflix_network

  # React Frontend
  frontend:
    build:
      context: ..
      dockerfile: devops/Dockerfile.frontend
    container_name: netflix_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8080/api
    networks:
      - netflix_network

volumes:
  postgres_data:
    driver: local

networks:
  netflix_network:
    driver: bridge
