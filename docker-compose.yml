version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: netflix-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: netflix_clone
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/data.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - netflix-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d netflix_clone"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend
  backend:
    image: openjdk:17-slim
    container_name: netflix-backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - maven_cache:/root/.m2
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/netflix_clone
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    command: sh -c "mvn spring-boot:run"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - netflix-network

volumes:
  postgres_data:
  maven_cache:

networks:
  netflix-network:
    driver: bridge
